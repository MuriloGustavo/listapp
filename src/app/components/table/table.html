<table mat-table [dataSource]="products">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let product">
      <mat-checkbox [(ngModel)]="product.checked"></mat-checkbox>
    </td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let product"> {{ product.name }} </td>
  </ng-container>

  <ng-container matColumnDef="quantity">
    <th mat-header-cell *matHeaderCellDef>Quantidade</th>
    <td mat-cell *matCellDef="let product"> {{ product.quantity }} </td>
  </ng-container>

  <ng-container matColumnDef="unitValue">
    <th mat-header-cell *matHeaderCellDef>Valor Unitário</th>
    <td mat-cell *matCellDef="let product">
      {{ product.unitValue | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}
    </td>
  </ng-container>

  <ng-container matColumnDef="totalValue">
    <th mat-header-cell *matHeaderCellDef>Valor Total</th>
    <td mat-cell *matCellDef="let product">
      {{ product.quantity * product.unitValue | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}
    </td>
  </ng-container>

  <ng-container matColumnDef="category">
    <th mat-header-cell *matHeaderCellDef>Categoria</th>
    <td mat-cell *matCellDef="let product"> {{ product.category }} </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Ações</th>
    <td mat-cell *matCellDef="let product">
      <button matIconButton (click)="edit(product.id)">
        <mat-icon>edit</mat-icon>
      </button>

      <button matIconButton (click)="delete(product)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columns"></tr>
  <tr mat-row *matRowDef="let row; columns: columns;" [class.checked-row]="row.checked"></tr>
</table>
